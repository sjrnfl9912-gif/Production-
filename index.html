<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>생산 관리 시스템</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ═══ SECTION: CSS Variables ═══ */
:root{--bg:#f0f1f3;--surface:#fff;--border:#dfe1e6;--border-light:#ebecf0;--text:#1a1d23;--text-sec:#5e6278;--text-muted:#8b8fa3;--pri:#2563eb;--pri-dk:#1d4ed8;--pri-lt:#dbeafe;--pri-tx:#1e40af;--grn:#059669;--grn-lt:#d1fae5;--grn-tx:#065f46;--ind:#4f46e5;--ind-lt:#e0e7ff;--ind-tx:#3730a3;--danger:#dc2626;--danger-lt:#fee2e2;--warn:#f59e0b;--warn-lt:#fef3c7;--shadow:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);--r:10px;--rs:6px}

/* ═══ SECTION: Reset & Base ═══ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;min-height:100dvh}

/* ═══ SECTION: Layout ═══ */
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(37,99,235,.25);position:sticky;top:0;z-index:100;will-change:transform;-webkit-transform:translateZ(0);transform:translateZ(0)}
.header-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.header-title svg{width:18px;height:18px}
.tab-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--border);padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom));gap:0;border-radius:0;display:flex;justify-content:space-around;box-shadow:0 -2px 10px rgba(0,0,0,.08);will-change:transform;-webkit-transform:translateZ(0);transform:translateZ(0)}
.tab-btn{flex:1;padding:8px 4px;font-size:10px;color:var(--text-muted);border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;border:none;cursor:pointer;transition:all .2s;background:0 0;white-space:nowrap;font-family:inherit;touch-action:manipulation;position:relative}
.tab-btn:hover{color:var(--pri);background:var(--pri-lt)}
.tab-btn.active{background:var(--pri-lt);color:var(--pri)}
.tab-btn.active::before{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--pri);border-radius:0 0 4px 4px}
.main{max-width:1200px;margin:0 auto;padding:12px 10px calc(80px + env(safe-area-inset-bottom))}
.page{display:none;animation:fadeUp .3s ease}.page.active{display:block}

/* ═══ SECTION: Components ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:visible}
.card-header{padding:12px 14px;border-bottom:1px solid var(--border-light);background:#fafbfc;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-header h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:14px}
.btn-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;cursor:pointer;transition:all .15s;background:0 0;color:var(--text-muted);touch-action:manipulation}
.btn-icon:hover{background:var(--danger-lt);color:var(--danger)}
.btn-icon:disabled{opacity:.25;pointer-events:none}
.btn-icon svg{width:18px;height:18px}
.btn-add{padding:6px 14px;border:1px dashed var(--pri);background:var(--pri-lt);color:var(--pri);border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .15s;touch-action:manipulation}
.btn-add:hover{background:#bfdbfe}
.btn{padding:10px 16px;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation}
.btn-primary{position:relative;overflow:hidden;background:var(--pri);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--pri-dk)}
.btn-primary:disabled{opacity:.5;pointer-events:none}
.btn-danger{position:relative;overflow:hidden;background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:var(--text-sec);border:1px solid var(--border)}
.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:5px 12px;font-size:12px}
.form-footer{display:flex;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-light);gap:8px}
.form-footer .btn{width:100%;justify-content:center}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700}
.badge-main{background:var(--pri-lt);color:var(--pri-tx)}
.badge-sub{background:var(--grn-lt);color:var(--grn-tx)}
.badge-etc{background:#f3f4f6;color:#6b7280}
.scroll-box{max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-box::-webkit-scrollbar{width:6px}
.scroll-box::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.worker-dim{color:var(--text-muted)}
.tooltip-wrap{position:relative;cursor:help}
.tooltip-wrap .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;white-space:nowrap;z-index:10;pointer-events:none}
.tooltip-wrap:hover .tip{display:block}
.empty-row{text-align:center;padding:40px 16px!important;color:var(--text-muted)}

/* ═══ SECTION: Forms ═══ */
label{display:block;font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:6px}
select,input[type=text],input[type=number],input[type=date],input[type=password]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:16px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s;outline:0}
select:focus,input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
input[type=number]{text-align:right}
.form-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px}
.type-select{font-weight:600;font-size:12px;padding:6px 8px;border-radius:6px}
.type-main{background:var(--pri-lt);color:var(--pri-tx);border-color:#bfdbfe}
.type-sub{background:var(--grn-lt);color:var(--grn-tx);border-color:#a7f3d0}
.type-etc{background:#f3f4f6;color:#4b5563;border-color:#d1d5db}

/* ═══ SECTION: Tables ═══ */
.task-table{width:100%;border-collapse:collapse;font-size:13px}
.task-table thead{display:none}
.task-table,.task-table tbody,.task-table tr,.task-table td{display:block;width:100%}
.task-table tr{background:#fff;border:1px solid var(--border-light);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.task-table td{padding:4px 0;border:none}
.task-table td:last-child{position:absolute;top:8px;right:8px}
.task-table select,.task-table input{position:relative;z-index:2}
.edit-table{width:100%;border-collapse:collapse;font-size:12px}
.edit-table thead{display:none}
.edit-table,.edit-table tbody,.edit-table tr,.edit-table td{display:block;width:100%}
.edit-table tr{background:#fff;border:1px solid var(--border-light);border-radius:8px;padding:12px;margin-bottom:10px}
.edit-table td{padding:3px 0;border:none;font-size:13px}
.edit-table td::before{content:attr(data-label);font-weight:600;color:var(--text-sec);font-size:11px;display:block}
.edit-table td:last-child{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light)}
.edit-table td:last-child::before{display:none}
.edit-table tbody tr:hover{background:#f8f9fb}
.expired-row{opacity:.5}
.expired-row td{text-decoration:line-through}
.records-date-header{font-size:12px;font-weight:700;color:var(--text-sec);padding:10px 4px 6px;display:flex;align-items:center;gap:8px}
.records-date-header::after{content:'';flex:1;height:1px;background:var(--border-light)}
.records-date-group{margin-bottom:16px}
.my-records-header{position:sticky;top:0;background:var(--surface);z-index:10;padding:8px 0 10px;border-bottom:1px solid var(--border-light);margin-bottom:12px}

/* ═══ SECTION: Dashboard ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:400px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;display:flex;align-items:flex-start;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.kpi-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:18px;height:18px}
.kpi-icon.blue{background:var(--pri-lt);color:var(--pri)}
.kpi-icon.green{background:var(--grn-lt);color:var(--grn)}
.kpi-icon.gray{background:#f3f4f6;color:#6b7280}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:2px}
.kpi-value{font-size:18px;font-weight:800;letter-spacing:-.02em}
.kpi-value .unit{font-size:15px;font-weight:400;color:var(--text-muted);margin-left:2px}
.dash-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
.dash-table th{padding:6px 8px;font-weight:700;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;word-break:break-word;overflow-wrap:break-word;scroll-snap-align:start}
.dash-table td{padding:6px 8px;border-bottom:1px solid var(--border-light);word-break:break-word;overflow-wrap:break-word}
.dash-table tbody tr:hover{background:#f8f9fb}
.dash-table .num{text-align:center}.dash-table .num-right{text-align:right}
.capa-thead th{background:var(--ind-lt);color:var(--ind-tx);font-size:10px}
.capa-highlight{background:rgba(79,70,229,.04)!important;font-weight:800;color:var(--ind)}
.inv-thead th{background:var(--pri-lt);color:var(--pri-tx)}
.dash-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
.weekly-note-col{display:none}
.m-weekly-card{background:#fff;border:1px solid var(--border-light);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.m-weekly-card .m-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.m-weekly-card .m-row:last-child{margin-bottom:0}
.m-weekly-name{font-weight:600;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-weekly-qty{font-weight:700;font-size:13px;white-space:nowrap;margin-left:8px}

/* ═══ SECTION: PIN ═══ */
.lock-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.lock-icon{font-size:48px;margin-bottom:16px}
.lock-title{font-size:18px;font-weight:700;margin-bottom:8px}
.lock-desc{font-size:14px;color:var(--text-muted);margin-bottom:24px}
.pin-input-wrap{display:flex;gap:10px;margin-bottom:16px}
.pin-digit{width:46px;height:52px;text-align:center;font-size:20px;font-weight:800;border:2px solid var(--border);border-radius:10px;font-family:inherit;-webkit-text-security:disc;outline:0;transition:border-color .15s}
.pin-digit:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.pin-digit.error{border-color:var(--danger);animation:shake .4s}
.pin-error{color:var(--danger);font-size:13px;font-weight:600;height:20px}
.week-nav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text-sec);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;touch-action:manipulation}
.week-nav-btn:hover{background:var(--pri-lt);color:var(--pri);border-color:var(--pri)}
.weekly-date-header{background:#f8fafc;font-weight:700;font-size:13px;padding:10px 16px;border-bottom:2px solid var(--border)}
.weekly-date-header .day-badge{display:inline-block;background:var(--pri);color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:4px;margin-left:8px}
.weekly-subtotal td{background:#f0f4ff;font-weight:800;border-top:2px solid var(--pri-lt)}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:95%;max-width:none;margin:10px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:700}
.modal-body{padding:16px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}
.settings-section{margin-bottom:32px}
.settings-section h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text)}
.settings-list{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border-light);font-size:12px}
.settings-item:last-child{border-bottom:none}
.settings-item .name{font-weight:600}
.settings-item .btn{padding:4px 10px;font-size:11px}
.settings-add{display:flex;gap:8px;margin-top:8px;flex-direction:column}
.settings-add input{flex:1;width:100%}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.toast{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:#1f2937;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s,opacity .3s;opacity:0;z-index:300;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ═══ SECTION: Utilities ═══ */
.section-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-label{font-size:14px;font-weight:700;color:var(--text-sec)}
.card-inner{margin-bottom:20px;box-shadow:none;border-color:var(--border-light)}
.subtitle-note{font-size:12px;font-weight:400;color:var(--text-muted)}
.field-group{margin-bottom:16px}
.select-md{max-width:240px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.date-input-sm{max-width:160px}
.overflow-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;overscroll-behavior-x:contain}
.week-label-text{font-size:14px;font-weight:700;min-width:180px;text-align:center}
.text-xs-muted{font-size:11px;color:var(--text-muted)}
.fw-700{font-weight:700}
.note-input{font-size:13px}
.hidden{display:none}
.text-muted{color:var(--text-muted)}
.full-height{height:calc(var(--vh,1vh)*100)}
.skeleton{background:var(--skeleton-base,#e9eaec);border-radius:6px;overflow:hidden;position:relative}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.5) 50%,transparent 100%);animation:skeleton-shimmer 1.4s ease infinite}
.skeleton-line{height:14px;margin-bottom:8px;border-radius:4px}
.skeleton-line.short{width:40%}.skeleton-line.medium{width:70%}.skeleton-line.full{width:100%}
.skeleton-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);padding:14px;margin-bottom:10px}

/* ═══ SECTION: Animations ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes skeleton-shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ═══ SECTION: Touch UX ═══ */
/* TOUCH-01: 최소 44x44px 터치 타겟 (터치 장치에서만 적용) */
/* TOUCH-02: touch-action on inputs (버튼류는 이미 적용됨) */
/* TOUCH-03: 시각적 터치 피드백 — scale + opacity + ripple */
@media (pointer: coarse) {
  .btn-icon{width:44px;height:44px}
  .week-nav-btn{width:44px;height:44px}
  .btn-sm{padding:10px 14px;min-height:44px}
  .settings-item .btn{padding:8px 12px;min-height:44px}
  input,select,textarea{touch-action:manipulation}
  .btn:active,.btn-add:active,.btn-icon:active,.week-nav-btn:active{transform:scale(0.94);opacity:0.82;transition:transform 0.05s,opacity 0.05s}
  .tab-btn:active{background:var(--pri-lt);color:var(--pri)}
}
/* TOUCH-03: Ripple — btn-primary / btn-danger CTA 버튼 */
.btn-primary::after,.btn-danger::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.25);opacity:0;transform:scale(0);border-radius:inherit;pointer-events:none;transition:transform 0.3s,opacity 0.3s}
.btn-primary:active::after,.btn-danger:active::after{transform:scale(1);opacity:1;transition:none}

/* ═══ SECTION: Desktop Override ═══ */
@media (min-width: 769px) {
  .header{padding:0 24px;height:64px}
  .header-title{font-size:18px}
  .header-title svg{width:22px;height:22px}
  .tab-nav{position:static;background:rgba(255,255,255,.12);padding:4px;border-radius:10px;gap:4px;border-top:none;box-shadow:none;justify-content:flex-start}
  .tab-btn{flex:unset;padding:8px 14px;font-size:12px;color:rgba(255,255,255,.7);flex-direction:row;line-height:inherit}
  .tab-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
  .tab-btn.active{background:#fff;color:var(--pri);box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .main{padding:28px 20px 60px}
  .form-grid{grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .card-body{padding:24px}
  .card-header{padding:16px 24px}
  .card-header h2{font-size:15px}
  .card{overflow:hidden}
  .task-table thead{display:table-header-group;background:#f4f5f7}
  .task-table,.task-table tbody,.task-table tr,.task-table td{display:revert;width:auto}
  .task-table th{padding:10px 14px;font-weight:600;color:var(--text-sec);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  .task-table td{padding:8px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
  .task-table tr{background:revert;border:revert;border-radius:0;padding:0;margin-bottom:0;position:revert}
  .task-table td:last-child{position:revert;top:auto;right:auto}
  .task-table select,.task-table input{position:revert;z-index:auto}
  .edit-table thead{display:table-header-group}
  .edit-table th{padding:8px 12px;font-weight:600;background:#f4f5f7;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
  .edit-table,.edit-table tbody,.edit-table tr,.edit-table td{display:revert;width:auto}
  .edit-table tr{background:revert;border:revert;border-radius:0;padding:0;margin-bottom:0}
  .edit-table td{padding:6px 12px;border-bottom:1px solid var(--border-light);font-size:12px}
  .edit-table td::before{display:none}
  .edit-table td:last-child{display:revert;gap:0;margin-top:0;padding-top:0;border-top:none;padding:6px 12px}
  .edit-table td:last-child::before{display:none}
  .kpi-grid{grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .kpi-card{padding:20px;flex-direction:row;align-items:center;gap:16px}
  .kpi-icon{width:48px;height:48px;border-radius:12px}
  .kpi-icon svg{width:26px;height:26px}
  .kpi-value{font-size:26px}
  .kpi-label{font-size:13px}
  .dash-table{font-size:13px;table-layout:auto}
  .dash-table th{padding:11px 16px}
  .dash-table td{padding:10px 16px}
  .capa-thead th{font-size:inherit}
  .dash-grid{grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
  .scroll-box{max-height:400px}

// ═══════════ DATA LOADING ═══════════
let subTaskMap={}; // 밑작업명 → 관련 메인품목 매핑

async function loadAll(){

// 밑작업명 → 관련 메인품목 자동 해석
// 우선순위: 1) DB 매핑 2) 키워드 매칭 3) 공통
function autoResolveRelated(subTaskName){
  // 1) DB에 매핑 있으면 사용 (공통/제외/특정품목)
  if(subTaskMap[subTaskName]) return subTaskMap[subTaskName];
  // 2) 키워드 자동매칭
  const name=subTaskName.toUpperCase();
  const matched=[];
  mainTasks.forEach(mt=>{
    const mtUp=mt.toUpperCase();
    if(name.includes('1717') && mtUp.includes('1717')) matched.push(mt);
    else if(name.includes('1417') && mtUp.includes('1417')) matched.push(mt);
    else if(name.includes('OPTIMUM') && mtUp.includes('OPTIMUM')) matched.push(mt);
    else if(name.includes('PRUDENT') && mtUp.includes('PRUDENT')) matched.push(mt);
    else if(name.includes('PIXX') && mtUp.includes('PIXX')) matched.push(mt);
  });
  if(matched.length) return matched.join(',');
  // 3) 매칭 안 되면 제외
  return '제외';
}

function populateWorkerSelects(){
  ['workerSelect','myWorkerSelect','adminFilterWorker'].forEach(id=>{

    const val=el.value;

    el.innerHTML=first+workers.map(w=>`<option value="${w}">${w}님</option>`).join('');
    el.value=val;
  });
}

function buildDatalist(){
  let dl=document.getElementById('sub-task-list');
  if(!dl){dl=document.createElement('datalist');dl.id='sub-task-list';document.body.appendChild(dl)}
  dl.innerHTML=[...subTasks,...mainTasks].map(t=>`<option value="${t}">`).join('');

// ═══════════ SWIPE TAB NAVIGATION — initSwipeNav() (TOUCH-04) ═══════════
(function initSwipeNav(){
  const TAB_ORDER=['input','myrecords','dashboard','admin'];
  const MIN_X=60;  // px: 스와이프로 인정하는 최소 수평 이동
  const MAX_Y=80;  // px: 이 이상 수직 이동이면 스크롤로 간주, 스와이프 취소
  let sx=0,sy=0;

  // passive:true — scroll을 절대 막지 않음 (RESEARCH.md Pitfall 1)
  // 이 touchstart 리스너는 iOS :active 즉시 발화도 보장함 (RESEARCH.md Pitfall 2)
  document.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
  },{passive:true});

  document.addEventListener('touchend',function(e){
    // PIN 입력 중 스와이프 무시 (RESEARCH.md Pitfall 5)
    if(document.activeElement&&document.activeElement.classList.contains('pin-digit'))return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<MIN_X)return;    // 수평 이동 부족
    if(Math.abs(dy)>MAX_Y)return;    // 수직 스크롤로 판단
    const dir=dx<0?1:-1;             // 왼쪽 스와이프=다음 탭, 오른쪽=이전 탭
    const cur=document.querySelector('.tab-btn.active')?.dataset.tab;
    const ci=TAB_ORDER.indexOf(cur);
    const ni=ci+dir;
    if(ni<0||ni>=TAB_ORDER.length)return;
    // 기존 탭 클릭 핸들러 재사용 — 새 탭 전환 로직 없음
    document.querySelector(`.tab-btn[data-tab="${TAB_ORDER[ni]}"]`)?.click();
  },{passive:true});
})();

// ═══════════ PIN SYSTEM ═══════════
function createPinInputs(wrapperId){
  const wrap=document.getElementById(wrapperId);
  wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');
    inp.type='password';inp.className='pin-digit';inp.maxLength=1;inp.inputMode='numeric';inp.dataset.idx=i;inp.autocomplete='off';
    wrap.appendChild(inp);
  }
  const digits=wrap.querySelectorAll('.pin-digit');
  digits.forEach((inp,i)=>{
    inp.addEventListener('input',e=>{
      const v=e.target.value.replace(/\D/g,'');e.target.value=v;
      if(v&&i<3)digits[i+1].focus();
      if(i===3&&v){const pin=Array.from(digits).map(d=>d.value).join('');if(pin.length===4)checkPinFor(wrapperId,pin)}
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0){digits[i-1].focus();digits[i-1].value=''}});
    inp.addEventListener('paste',e=>{
      e.preventDefault();const p=(e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,4);
      p.split('').forEach((c,j)=>{if(digits[j])digits[j].value=c});
      if(p.length===4)checkPinFor(wrapperId,p);else if(p.length>0)digits[Math.min(p.length,3)].focus();
    });
  });
}

function checkPinFor(wrapperId,pin){
  const digits=document.getElementById(wrapperId).querySelectorAll('.pin-digit');
  if(pin===adminPin){
    adminUnlocked=true;
    document.getElementById('adminLock').style.display='none';
    document.getElementById('adminContent').style.display='block';
    renderAdminSettings();
  }else{
    document.getElementById('adminPinError').textContent='비밀번호가 틀렸습니다';
    digits.forEach(d=>{d.classList.add('error');d.value=''});digits[0].focus();
    setTimeout(()=>{digits.forEach(d=>d.classList.remove('error'));document.getElementById('adminPinError').textContent=''},1500);
  }
}

function getTypeClass(t){return t==='메인작업'?'type-main':t==='밑작업'?'type-sub':'type-etc'}
function buildTaskNameCell(id,type,value){
  if(type==='메인작업'){
    let o='<option value="" disabled selected>품목 선택 (필수)</option>';
    mainTasks.forEach(t=>{o+=`<option value="${t}" ${value===t?'selected':''}>${t}</option>`});

  }
  const ph=type==='밑작업'?'선택 또는 직접입력':'기타 내용 입력';
  return `<input type="text" list="sub-task-list" placeholder="${ph}" value="${value}" onchange="updateRow(${id},'taskName',this.value)" required class="note-input">`;
}
function buildRelatedInfo(type,taskName){
  if(type!=='밑작업') return '';
  const resolved=autoResolveRelated(taskName);
  if(!taskName) return '';
  const label=resolved==='공통'?'공통 (전체)':resolved.split(',').length>3?resolved.split(',').slice(0,2).join(', ')+' 외 '+(resolved.split(',').length-2)+'개':resolved;
  return `<div style="margin-top:4px;font-size:10px;padding:4px 8px;background:#fffbeb;border:1px solid #fde68a;border-radius:4px;color:#92400e">▸ ${label}</div>`;
}
function renderRows(){
  const tbody=document.getElementById('taskTableBody'),rows=AppState.tasks;
  tbody.innerHTML=rows.map(r=>{
    return `<tr>
    <td><select class="type-select ${getTypeClass(r.type)}" onchange="changeType(${r.id},this.value)">
      <option value="메인작업" ${r.type==='메인작업'?'selected':''}>메인작업</option>
      <option value="밑작업" ${r.type==='밑작업'?'selected':''}>밑작업</option>
      <option value="기타" ${r.type==='기타'?'selected':''}>기타</option></select></td>
    <td>${buildTaskNameCell(r.id,r.type,r.taskName)}${buildRelatedInfo(r.type,r.taskName)}</td>
    <td><input type="number" min="1" placeholder="0" value="${r.quantity}" onchange="updateRow(${r.id},'quantity',this.value)" required></td>
    <td><input type="text" placeholder="특이사항" value="${r.note}" onchange="updateRow(${r.id},'note',this.value)" class="note-input"></td>
    <td style="text-align:center"><button type="button" class="btn-icon" onclick="removeRow(${r.id})" ${rows.length===1?'disabled':''}>

function getRows(){return AppState.tasks}
function setRows(r){AppState.tasks=r;renderRows()}
function addRow(){const r=getRows();r.push({id:++rowId,type:'메인작업',taskName:'',quantity:'',note:'',relatedMain:''});setRows(r)}
function removeRow(id){const r=getRows();if(r.length<=1)return;setRows(r.filter(x=>x.id!==id))}
function updateRow(id,f,v){const r=getRows(),x=r.find(x=>x.id===id);if(x)x[f]=v;AppState.tasks=r;if(f==='taskName'&&x&&x.type==='밑작업')renderRows()}
function changeType(id,t){const r=getRows(),x=r.find(x=>x.id===id);if(x){x.type=t;x.taskName='';x.relatedMain=t==='밑작업'?'공통':''}setRows(r)}

async function handleSubmit(e){
  e.preventDefault();
  const worker=document.getElementById('workerSelect').value,date=document.getElementById('dateInput').value;
  if(!worker){showToast('⚠️ 작업자 선택');return}
  const rows=getRows().filter(r=>r.taskName&&r.quantity);
  if(!rows.length){showToast('⚠️ 작업 내용 입력');return}
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='저장 중...';
  const payload=rows.map(r=>{
    let rel=null;
    if(r.type==='밑작업') rel=autoResolveRelated(r.taskName);
    return{date,worker,type:r.type,task_name:r.taskName,quantity:parseInt(r.quantity,10),note:r.note||'',related_main_task:rel};
  });
  const{data,error}=await sb.from('production_records').insert(payload).select();
  btn.disabled=false;btn.textContent='💾 실적 제출하기';
  if(error){showToast('❌ '+error.message);return}
  data.forEach(r=>records.unshift({id:r.id,date:r.date,worker:r.worker,type:r.type,taskName:r.task_name,quantity:r.quantity,note:r.note||'',relatedMain:r.related_main_task||'',created_at:r.created_at}));
  showToast('✅ 저장 완료!');setRows([{id:++rowId,type:'메인작업',taskName:'',quantity:'',note:'',relatedMain:''}]);
}

function loadMyRecords(){

function onEditTypeChange(){
  const type=document.getElementById('editType').value,wrap=document.getElementById('editTaskNameWrap');

async function saveEdit(id,isAdmin){
  const date=document.getElementById('editDate').value;
  const worker=isAdmin?document.getElementById('editWorker').value:records.find(r=>r.id===id).worker;
  const type=document.getElementById('editType').value;
  const taskName=document.getElementById('editTaskName').value;
  const qty=parseInt(document.getElementById('editQty').value,10);
  const note=document.getElementById('editNote').value;
  const relEl=document.getElementById('editRelatedMain');
  const relatedMain=type==='밑작업'&&relEl?relEl.value:null;
  if(!taskName||!qty){showToast('⚠️ 필수값 입력');return}
  const{error}=await sb.from('production_records').update({date,worker,type,task_name:taskName,quantity:qty,note,related_main_task:relatedMain}).eq('id',id);
  if(error){showToast('❌ '+error.message);return}
  const r=records.find(x=>x.id===id);
  if(r){r.date=date;r.worker=worker;r.type=type;r.taskName=taskName;r.quantity=qty;r.note=note;r.relatedMain=relatedMain||''}
  closeModal();showToast('✅ 수정 완료');
  if(isAdmin)loadAdminRecords();else loadMyRecords();
}

async function deleteRecord(id,isAdmin){
  if(!await customConfirm('정말 삭제하시겠습니까?'))return;
  const{error}=await sb.from('production_records').delete().eq('id',id);
  if(error){showToast('❌ '+error.message);return}
  records=records.filter(r=>r.id!==id);
  showToast('🗑️ 삭제 완료');
  if(isAdmin)loadAdminRecords();else loadMyRecords();
}

let weekOffset=0;
function getWeekRange(off){
  const now=new Date(),day=now.getDay(),diff=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diff+(off*7));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const dates=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.toISOString().split('T')[0])}
  return{mon,sun,dates};
}
function fmtDate(s){const d=new Date(s+'T00:00:00'),days=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`}

  const dr=records.filter(r=>r.date===date);

}

function renderDailyReport(){
  const date=document.getElementById('dailyReportDate').value;
  const area=document.getElementById('dailyReportArea');
  if(!date){area.innerHTML='<div class="empty-row">날짜를 선택해주세요</div>';return}

  let h=`<table class="dash-table"><thead><tr><th>담당자</th><th>구분</th><th>작업명</th><th class="num">수량</th><th>비고</th></tr></thead><tbody>`;
  workerKeys.forEach(worker=>{

        </td>`;
      }
      h+=`<td><span class="badge ${badge}">${r.type}</span></td>
      <td style="font-weight:600">${r.taskName}</td>
      <td class="num fw-700">${r.quantity}<span class="text-xs-muted">EA</span></td>
      <td class="text-muted" style="font-size:12px">${r.note||'-'}</td></tr>`;
    });
    h+=`<tr><td colspan="5" style="padding:0;border-bottom:2px solid var(--border-light)"></td></tr>`;
  });
  h+=`</tbody></table>`;
  area.innerHTML=h;
}

function buildDailyText(date){
  const byWorker=getDailyByWorker(date);
  const workerKeys=Object.keys(byWorker).sort();
  if(!workerKeys.length)return '';
  const [y,m,d]=date.split('-');
  let text=`📋 ${y}년 ${parseInt(m)}월 ${parseInt(d)}일 일생산현황\n\n`;
  workerKeys.forEach(worker=>{
    text+=`${worker}\n`;
    byWorker[worker].forEach(r=>{
      text+=`-${r.taskName} ${r.quantity}대 완료`;
      if(r.note)text+=`(${r.note})`;
      text+='\n';
    });
    text+='\n';
  });
  return text.trim();
}

function copyDailyReport(){
  const date=document.getElementById('dailyReportDate').value;
  if(!date){showToast('⚠️ 날짜를 선택해주세요');return}
  const text=buildDailyText(date);
  if(!text){showToast('⚠️ 해당일 데이터 없음');return}

  // 카카오톡 인앱브라우저는 navigator.clipboard 차단 → execCommand 우선
  let copied=false;
  try{
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.style.cssText='position:fixed;left:-9999px;top:50%;opacity:0;font-size:16px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    copied=document.execCommand('copy');
    document.body.removeChild(ta);
  }catch(e){}

  if(copied){showToast('📋 복사됨!');return}

  // execCommand도 실패하면 직접 선택할 수 있는 모달 표시
  const html=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h3>📋 텍스트 복사</h3><button class="btn-icon" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-sec);margin-bottom:10px">아래 텍스트를 길게 눌러 전체 선택 후 복사하세요.</p>
        <textarea id="copyTextArea" readonly style="width:100%;height:220px;padding:10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;resize:none;background:#f8f9fb;line-height:1.7">${text}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="selectCopyText()">전체 선택</button>
        <button class="btn btn-outline" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalContainer').innerHTML=html;
}

function renderWeekly(){
  const{mon,sun,dates}=getWeekRange(weekOffset);
  document.getElementById('weekLabel').textContent=`${mon.getMonth()+1}/${mon.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()} (${mon.getFullYear()})`;
  const wr=records.filter(r=>dates.includes(r.date));
  if(!wr.length){document.getElementById('weeklyArea').innerHTML='<div class="empty-row">해당 주차 데이터 없음</div>';return}
  const byDate={};dates.forEach(d=>{byDate[d]=[]});wr.forEach(r=>{if(byDate[r.date])byDate[r.date].push(r)});

  let h='', wm=0, ws=0;
  dates.forEach(ds=>{
    const dr=byDate[ds];if(!dr||!dr.length)return;
    let dm=0,dsu=0;
    // 날짜 헤더
    h+=`<div style="background:#f0f4ff;padding:10px 14px;font-weight:700;font-size:13px;border-bottom:2px solid var(--pri-lt);display:flex;justify-content:space-between;align-items:center">${fmtDate(ds)}<span style="background:var(--pri);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px">${dr.length}건</span></div>`;
    // 레코드 카드
    [...dr].sort((a,b)=>a.worker.localeCompare(b.worker)).forEach(r=>{
      const c=r.type==='메인작업'?'badge-main':r.type==='밑작업'?'badge-sub':'badge-etc';
      if(r.type==='메인작업')dm+=r.quantity;else if(r.type==='밑작업')dsu+=r.quantity;
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border-light);font-size:13px">
        <span style="font-weight:600;min-width:40px">${r.worker}</span>
        <span class="badge ${c}" style="flex-shrink:0">${r.type}</span>
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.taskName}</span>
        <span style="font-weight:700;white-space:nowrap">${r.quantity}EA</span>
      </div>`;
    });
    // 일 소계
    h+=`<div style="background:#f0f4ff;padding:8px 14px;display:flex;justify-content:space-between;font-size:12px;font-weight:700;border-bottom:2px solid var(--pri-lt)">
      <span>일 소계</span><span style="color:var(--pri)">${dm+dsu} EA <span style="font-weight:400;color:var(--text-muted)">메인${dm}/밑${dsu}</span></span></div>`;
    wm+=dm;ws+=dsu;
  });
  // 주간 합계
  h+=`<div style="background:var(--pri-lt);padding:14px;display:flex;justify-content:space-between;align-items:center;font-weight:800;border-top:3px solid var(--pri)">
    <span style="font-size:14px;color:var(--pri-tx)">📊 주간 합계</span>
    <span><span style="font-size:18px;color:var(--pri)">${wm+ws} EA</span> <span style="font-size:11px;font-weight:400;color:var(--pri-tx)">메인${wm}/밑${ws}</span></span></div>`;

  // 메인작업 품목별 주간 요약
  const mainSummary={};
  wr.filter(r=>r.type==='메인작업').forEach(r=>{mainSummary[r.taskName]=(mainSummary[r.taskName]||0)+r.quantity});

function fmtTaskName(name){
  const brands=['OPTIMUM','PRUDENT','PIXX'];
  for(const b of brands){
    if(name.startsWith(b+' ')){
      return `<div style="font-size:10px;color:var(--text-muted);line-height:1.2">${b}</div><div style="white-space:nowrap">${name.slice(b.length+1)}</div>`;
    }
  }
  return `<div style="white-space:nowrap">${name}</div>`;
}

// 밑작업의 relatedMain이 특정 메인작업과 매칭되는지 (콤마 구분 지원)
function isRelatedTo(relatedMain,mainTaskName){
  if(!relatedMain) return false;
  if(relatedMain==='공통') return false; // 공통은 별도 체크
  return relatedMain.split(',').some(t=>t.trim()===mainTaskName);
}

// SECTION:Business Logic Helpers — calcLeadTimeStats
// BIZ-01: only dates where THIS worker performed THIS 메인작업 directly
// BIZ-02: per-day contribution weighted by proportion of that day's main-task output
// BIZ-04: weighted average + optional median
function calcLeadTimeStats(worker, taskName, allRecords) {
  const mainDayMap = {}; // "YYYY-MM-DD" -> { thisQty, totalMainQty }

  allRecords.forEach(r => {
    if (r.worker !== worker || r.type !== '메인작업') return;
    const d = r.date;
    if (!mainDayMap[d]) mainDayMap[d] = { thisQty: 0, totalMainQty: 0 };
    mainDayMap[d].totalMainQty += r.quantity; // all main tasks this worker this day
    if (r.taskName === taskName) mainDayMap[d].thisQty += r.quantity;
  });

  // BIZ-01: only days where target item was actually worked
  const activeDays = Object.values(mainDayMap).filter(v => v.thisQty > 0);
  const mainDays = activeDays.length;

  if (mainDays === 0) return { mainDays: 0, weightedAvg: 0, median: 0, perDayValues: [] };

  // BIZ-02: "이 품목만 했으면 하루에 몇 개?" 공식
  // effectiveDays = 하루별 (이 품목 비율) 합계
  // weightedAvg = 총수량 / effectiveDays
  const totalQty = activeDays.reduce((s, v) => s + v.thisQty, 0);
  const effectiveDays = activeDays.reduce((s, v) => {
    const share = v.totalMainQty > 0 ? v.thisQty / v.totalMainQty : 1;
    return s + share;
  }, 0);

  // BIZ-02: per-day full-time equivalent (역산: 이 품목만 했으면 몇 개)
  const perDayValues = activeDays.map(v => {
    const share = v.totalMainQty > 0 ? v.thisQty / v.totalMainQty : 1;
    return share > 0 ? v.thisQty / share : v.thisQty;
  });

  // BIZ-04: weighted average = totalQty / effectiveDays
  const weightedAvg = effectiveDays > 0 ? +(totalQty / effectiveDays).toFixed(1) : 0;

  // BIZ-04 (optional median for future use)
  const sorted = [...perDayValues].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  const median = +(sorted.length % 2 !== 0
    ? sorted[mid]
    : (sorted[mid - 1] + sorted[mid]) / 2).toFixed(1);

  return { mainDays, weightedAvg, median, perDayValues };
}

function renderCapa(){
  const cd = [];
  const seenCapa = new Set();
  records.forEach(r => { if (r.type === '메인작업') seenCapa.add(r.worker + '|' + r.taskName); });
  seenCapa.forEach(key => {
    const [worker, taskName] = key.split('|');
    const total = records
      .filter(r => r.worker === worker && r.type === '메인작업' && r.taskName === taskName)
      .reduce((s, r) => s + r.quantity, 0);
    const { mainDays, weightedAvg } = calcLeadTimeStats(worker, taskName, records);
    cd.push({ worker, taskName, total, days: mainDays, avg: weightedAvg });
  });
  cd.sort((a, b) => a.worker === b.worker ? b.total - a.total : a.worker.localeCompare(b.worker));

  let h=`<thead class="capa-thead"><tr><th>담당자</th><th>품목</th><th class="num">누적</th><th class="num">워킹데이</th><th class="num" style="background:rgba(79,70,229,.08)">일평균</th></tr></thead><tbody>`;
  if(!cd.length)h+=`<tr><td colspan="5" class="empty-row">데이터 없음</td></tr>`;
  else cd.forEach((it,i)=>{const sw=i===0||cd[i-1].worker!==it.worker;h+=`<tr><td style="font-weight:600;white-space:nowrap">${sw?it.worker:'<span class="worker-dim">'+it.worker+'</span>'}</td><td style="font-weight:600;color:var(--ind)">${fmtTaskName(it.taskName)}</td><td class="num" style="font-weight:700">${it.total}</td><td class="num" style="color:var(--text-muted)">${it.days}일</td><td class="num capa-highlight">${it.avg}</td></tr>`});
  document.getElementById('capaTable').innerHTML=h+'</tbody>';
}


function renderInventory(){
  const{mon,sun,dates}=getWeekRange(weekOffset);
  const weekNum=Math.ceil(mon.getDate()/7);
  const title=`📦 ${mon.getMonth()+1}월 ${weekNum}주차 총 작업현황`;
  document.getElementById('weekSummaryTitle').textContent=title;

  const wr=records.filter(r=>dates.includes(r.date));
  if(!wr.length){document.getElementById('inventoryArea').innerHTML='<div class="empty-row">해당 주차 데이터 없음</div>';return}

  // 작업자별 → 타입별 → 품목별 합산
  const byWorker={};
  wr.forEach(r=>{
    if(!byWorker[r.worker])byWorker[r.worker]={메인작업:{},밑작업:{},기타:{}};
    const bucket=byWorker[r.worker][r.type];
    bucket[r.taskName]=(bucket[r.taskName]||0)+r.quantity;
  });

  let h=`<table class="dash-table"><tbody>`;
  Object.keys(byWorker).sort().forEach(worker=>{
    const data=byWorker[worker];
    const workerTotal=wr.filter(r=>r.worker===worker).reduce((s,r)=>s+r.quantity,0);
    h+=`<tr><td colspan="3" style="background:#f0f4ff;padding:10px 16px;font-weight:700;font-size:13px;border-bottom:2px solid var(--pri-lt)">${worker} <span style="font-weight:400;color:var(--text-muted);font-size:12px;margin-left:6px">총 ${workerTotal}EA</span></td></tr>`;
    ['메인작업','밑작업','기타'].forEach(type=>{
      const items=data[type];
      const entries=Object.entries(items).sort((a,b)=>b[1]-a[1]);
      if(!entries.length)return;
      const badge=type==='메인작업'?'badge-main':type==='밑작업'?'badge-sub':'badge-etc';
      entries.forEach(([name,qty])=>{
        h+=`<tr><td style="padding:7px 16px"><span class="badge ${badge}">${type}</span></td><td style="padding:7px 16px;font-weight:600">${name}</td><td style="padding:7px 16px;text-align:right;font-weight:700">${qty} EA</td></tr>`;
      });
    });
  });
  document.getElementById('inventoryArea').innerHTML=h+'</tbody></table>';
}

function renderRecent(){
  const s=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,100);

  s.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r)});
  const dates=Object.keys(byDate).sort((a,b)=>new Date(b)-new Date(a));

// 카카오톡 인앱브라우저: 키보드 올라올 때 하단 탭바 숨기기
function initKeyboardHandler(){
  const tabNav=document.getElementById('tabNav');
  const isMobile=()=>window.innerWidth<=768;

  if(window.visualViewport){
    let baseH=window.visualViewport.height;
    window.visualViewport.addEventListener('resize',()=>{
      if(!isMobile())return;
      const isKeyboard=window.visualViewport.height<baseH*0.75;
      tabNav.style.display=isKeyboard?'none':'';
      // ─── 추가: 키보드 오픈 시 포커스 필드 스크롤 (VIEW-03) ───
      if(isKeyboard){
        const focused=document.activeElement;
        if(focused&&['INPUT','SELECT','TEXTAREA'].includes(focused.tagName)){
          setTimeout(()=>focused.scrollIntoView({block:'center',behavior:'smooth'}),100);
        }
      }
      // ─── 끝 ───
      // 키보드 닫힐 때 기준 높이 갱신
      if(!isKeyboard)baseH=window.visualViewport.height;
    });
  }else{
    // fallback: input focus/blur 감지
    document.addEventListener('focusin',e=>{
      if(!isMobile())return;
      if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)){
        tabNav.style.display='none';
      }
    });
    document.addEventListener('focusout',()=>{
      if(!isMobile())return;
      setTimeout(()=>{
        if(!document.activeElement||!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){
          tabNav.style.display='';
        }
      },150);
    });
  }
}
