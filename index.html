<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생산 관리 시스템</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#f0f1f3;--surface:#fff;--border:#dfe1e6;--border-light:#ebecf0;--text:#1a1d23;--text-sec:#5e6278;--text-muted:#8b8fa3;--pri:#2563eb;--pri-dk:#1d4ed8;--pri-lt:#dbeafe;--pri-tx:#1e40af;--grn:#059669;--grn-lt:#d1fae5;--grn-tx:#065f46;--ind:#4f46e5;--ind-lt:#e0e7ff;--ind-tx:#3730a3;--danger:#dc2626;--danger-lt:#fee2e2;--warn:#f59e0b;--warn-lt:#fef3c7;--shadow:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(37,99,235,.25);position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.header-title svg{width:22px;height:22px}
.tab-nav{display:flex;gap:4px;background:rgba(255,255,255,.12);padding:4px;border-radius:10px}
.tab-btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.7);background:0 0;white-space:nowrap;font-family:inherit}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.tab-btn.active{background:#fff;color:var(--pri);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.main{max-width:1200px;margin:0 auto;padding:28px 20px 60px}
.page{display:none;animation:fadeUp .3s ease}.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 24px;border-bottom:1px solid var(--border-light);background:#fafbfc;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-header h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
label{display:block;font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:6px}
select,input[type=text],input[type=number],input[type=date],input[type=password]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s;outline:0}
select:focus,input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
input[type=number]{text-align:right}
.task-table{width:100%;border-collapse:collapse;font-size:13px}
.task-table thead{background:#f4f5f7}
.task-table th{padding:10px 14px;font-weight:600;color:var(--text-sec);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.task-table td{padding:8px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.type-select{font-weight:600;font-size:12px;padding:6px 8px;border-radius:6px}
.type-main{background:var(--pri-lt);color:var(--pri-tx);border-color:#bfdbfe}
.type-sub{background:var(--grn-lt);color:var(--grn-tx);border-color:#a7f3d0}
.type-etc{background:#f3f4f6;color:#4b5563;border-color:#d1d5db}
.btn-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;cursor:pointer;transition:all .15s;background:0 0;color:var(--text-muted)}
.btn-icon:hover{background:var(--danger-lt);color:var(--danger)}
.btn-icon:disabled{opacity:.25;pointer-events:none}
.btn-icon svg{width:18px;height:18px}
.btn-add{padding:6px 14px;border:1px dashed var(--pri);background:var(--pri-lt);color:var(--pri);border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .15s}
.btn-add:hover{background:#bfdbfe}
.btn{padding:9px 20px;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--pri);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--pri-dk)}
.btn-primary:disabled{opacity:.5;pointer-events:none}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:var(--text-sec);border:1px solid var(--border)}
.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:5px 12px;font-size:12px}
.form-footer{display:flex;justify-content:flex-end;padding-top:20px;border-top:1px solid var(--border-light);gap:8px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
.kpi-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.kpi-icon svg{width:26px;height:26px}
.kpi-icon.blue{background:var(--pri-lt);color:var(--pri)}
.kpi-icon.green{background:var(--grn-lt);color:var(--grn)}
.kpi-icon.gray{background:#f3f4f6;color:#6b7280}
.kpi-label{font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:2px}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-.02em}
.kpi-value .unit{font-size:15px;font-weight:400;color:var(--text-muted);margin-left:2px}

/* Dash tables */
.dash-table{width:100%;border-collapse:collapse;font-size:13px}
.dash-table th{padding:11px 16px;font-weight:700;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
.dash-table td{padding:10px 16px;border-bottom:1px solid var(--border-light)}
.dash-table tbody tr:hover{background:#f8f9fb}
.dash-table .num{text-align:center}.dash-table .num-right{text-align:right}
.capa-thead th{background:var(--ind-lt);color:var(--ind-tx)}
.capa-highlight{background:rgba(79,70,229,.04)!important;font-weight:800;color:var(--ind)}
.inv-thead th{background:var(--pri-lt);color:var(--pri-tx)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700}
.badge-main{background:var(--pri-lt);color:var(--pri-tx)}
.badge-sub{background:var(--grn-lt);color:var(--grn-tx)}
.badge-etc{background:#f3f4f6;color:#6b7280}
.scroll-box{max-height:400px;overflow-y:auto}
.scroll-box::-webkit-scrollbar{width:6px}
.scroll-box::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.worker-dim{color:var(--text-muted)}
.tooltip-wrap{position:relative;cursor:help}
.tooltip-wrap .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;white-space:nowrap;z-index:10;pointer-events:none}
.tooltip-wrap:hover .tip{display:block}
.empty-row{text-align:center;padding:40px 16px!important;color:var(--text-muted)}

/* PIN */
.lock-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.lock-icon{font-size:48px;margin-bottom:16px}
.lock-title{font-size:18px;font-weight:700;margin-bottom:8px}
.lock-desc{font-size:14px;color:var(--text-muted);margin-bottom:24px}
.pin-input-wrap{display:flex;gap:10px;margin-bottom:16px}
.pin-digit{width:52px;height:60px;text-align:center;font-size:24px;font-weight:800;border:2px solid var(--border);border-radius:10px;font-family:inherit;-webkit-text-security:disc;outline:0;transition:border-color .15s}
.pin-digit:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.pin-digit.error{border-color:var(--danger);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-error{color:var(--danger);font-size:13px;font-weight:600;height:20px}

/* Week nav */
.week-nav-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text-sec);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s}
.week-nav-btn:hover{background:var(--pri-lt);color:var(--pri);border-color:var(--pri)}
.weekly-date-header{background:#f8fafc;font-weight:700;font-size:13px;padding:10px 16px;border-bottom:2px solid var(--border)}
.weekly-date-header .day-badge{display:inline-block;background:var(--pri);color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:4px;margin-left:8px}
.weekly-subtotal td{background:#f0f4ff;font-weight:800;border-top:2px solid var(--pri-lt)}

/* Edit modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:90%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:700}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

/* Settings */
.settings-section{margin-bottom:32px}
.settings-section h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text)}
.settings-list{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border-light);font-size:13px}
.settings-item:last-child{border-bottom:none}
.settings-item .name{font-weight:600}
.settings-add{display:flex;gap:8px;margin-top:8px}
.settings-add input{flex:1}

/* Spinner / Toast */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1f2937;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s,opacity .3s;opacity:0;z-index:300;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Edit records table */
.edit-table{width:100%;border-collapse:collapse;font-size:12px}
.edit-table th{padding:8px 12px;font-weight:600;background:#f4f5f7;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.edit-table td{padding:6px 12px;border-bottom:1px solid var(--border-light)}
.edit-table tbody tr:hover{background:#f8f9fb}
.expired-row{opacity:.5}
.expired-row td{text-decoration:line-through}

@media(max-width:768px){
  .header{padding:0 10px;flex-wrap:wrap;height:auto;padding:10px}
  .tab-nav{gap:2px;padding:3px;flex-wrap:wrap}.tab-btn{padding:6px 8px;font-size:10px}
  .main{padding:16px 10px 40px}.form-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr}.dash-grid{grid-template-columns:1fr}
  .card-body{padding:16px}
}
</style>
</head>
<body>
<header class="header">
  <div class="header-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>
    생산 관리 시스템
  </div>
  <nav class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-tab="input">📋 실적 입력</button>
    <button class="tab-btn" data-tab="myrecords">✏️ 내 실적 수정</button>
    <button class="tab-btn" data-tab="dashboard">📊 주간 대시보드</button>
    <button class="tab-btn" data-tab="admin">⚙️ 관리자 설정</button>
  </nav>
</header>

<div class="main">
  <!-- ══ 1. 실적 입력 ══ -->
  <div id="page-input" class="page active">
    <div class="card">
      <div class="card-header"><h2>📋 당일 작업 실적 보고</h2></div>
      <div class="card-body">
        <form id="inputForm" onsubmit="handleSubmit(event)">
          <div class="form-grid">
            <div><label>👤 담당자</label><select id="workerSelect" required><option value="">선택</option></select></div>
            <div><label>📅 진행일</label><input type="date" id="dateInput" required></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h3 style="font-size:14px;font-weight:700;color:var(--text-sec)">⚙️ 상세 작업 내역</h3>
            <button type="button" class="btn-add" onclick="addRow()">+ 항목 추가</button>
          </div>
          <div class="card" style="margin-bottom:20px;box-shadow:none;border-color:var(--border-light)">
            <table class="task-table"><thead><tr>
              <th style="width:110px">구분</th><th>작업명</th><th style="width:100px">수량(EA)</th><th>비고</th><th style="width:44px"></th>
            </tr></thead><tbody id="taskTableBody"></tbody></table>
          </div>
          <div class="form-footer"><button type="submit" class="btn btn-primary" id="submitBtn">💾 실적 제출하기</button></div>
        </form>
      </div>
    </div>
  </div>

  <!-- ══ 2. 내 실적 수정 ══ -->
  <div id="page-myrecords" class="page">
    <div class="card">
      <div class="card-header">
        <h2>✏️ 내 실적 수정 <span style="font-size:12px;font-weight:400;color:var(--text-muted)">(7일 이내 수정 가능)</span></h2>
      </div>
      <div class="card-body">
        <div style="margin-bottom:16px"><label>👤 담당자 선택</label><select id="myWorkerSelect" onchange="loadMyRecords()" style="max-width:240px"><option value="">선택</option></select></div>
        <div id="myRecordsArea"></div>
      </div>
    </div>
  </div>

  <!-- ══ 3. 대시보드 ══ -->
  <div id="page-dashboard" class="page">
    <div id="dashLock" class="card">
      <div class="lock-overlay">
        <div class="lock-icon">🔒</div><div class="lock-title">관리자 전용 대시보드</div>
        <div class="lock-desc">비밀번호 4자리를 입력해주세요</div>
        <div class="pin-input-wrap" id="dashPinWrap"></div>
        <div class="pin-error" id="dashPinError"></div>
      </div>
    </div>
    <div id="dashContent" style="display:none">
      <div class="kpi-grid" id="kpiArea"></div>
      <div class="card" style="margin-bottom:24px">
        <div class="card-header"><h2>📅 주차별 생산 레이블</h2>
          <div style="display:flex;align-items:center;gap:8px">
            <button type="button" class="week-nav-btn" onclick="changeWeek(-1)">◀</button>
            <span id="weekLabel" style="font-size:14px;font-weight:700;min-width:180px;text-align:center"></span>
            <button type="button" class="week-nav-btn" onclick="changeWeek(1)">▶</button>
          </div>
        </div>
        <div style="overflow-x:auto" id="weeklyArea"></div>
      </div>
      <div class="card" style="margin-bottom:24px">
        <div class="card-header"><h2>📊 CAPA 분석</h2></div>
        <div style="overflow-x:auto"><table class="dash-table" id="capaTable"></table></div>
      </div>
      <div class="dash-grid">
        <div class="card"><div class="card-header"><h2>📦 품목별 누적 (재고조사)</h2></div><div class="scroll-box" id="inventoryArea"></div></div>
        <div class="card"><div class="card-header"><h2>📋 최근 보고 내역</h2></div><div class="scroll-box" id="recentArea"></div></div>
      </div>
    </div>
  </div>

  <!-- ══ 4. 관리자 설정 ══ -->
  <div id="page-admin" class="page">
    <div id="adminLock" class="card">
      <div class="lock-overlay">
        <div class="lock-icon">🔐</div><div class="lock-title">관리자 설정</div>
        <div class="lock-desc">비밀번호 4자리를 입력해주세요</div>
        <div class="pin-input-wrap" id="adminPinWrap"></div>
        <div class="pin-error" id="adminPinError"></div>
      </div>
    </div>
    <div id="adminContent" style="display:none">
      <!-- 작업자 관리 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>👥 작업자 관리</h2></div>
        <div class="card-body">
          <div id="workersList"></div>
          <div class="settings-add"><input type="text" id="newWorkerInput" placeholder="새 작업자 이름"><button class="btn btn-primary btn-sm" onclick="addWorker()">추가</button></div>
        </div>
      </div>
      <!-- 메인작업 품목 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>🔵 메인작업 품목 관리</h2></div>
        <div class="card-body">
          <div id="mainTasksList" class="scroll-box" style="max-height:300px"></div>
          <div class="settings-add"><input type="text" id="newMainTaskInput" placeholder="새 메인작업 품목명"><button class="btn btn-primary btn-sm" onclick="addMainTask()">추가</button></div>
        </div>
      </div>
      <!-- 밑작업 품목 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>🟢 밑작업 품목 관리</h2></div>
        <div class="card-body">
          <div id="subTasksList" class="scroll-box" style="max-height:300px"></div>
          <div class="settings-add"><input type="text" id="newSubTaskInput" placeholder="새 밑작업 품목명"><button class="btn btn-primary btn-sm" onclick="addSubTask()">추가</button></div>
        </div>
      </div>
      <!-- 비밀번호 변경 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>🔑 관리자 비밀번호 변경</h2></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;max-width:300px">
            <input type="password" id="newPinInput" placeholder="새 비밀번호 4자리" maxlength="4">
            <button class="btn btn-primary btn-sm" onclick="changePin()">변경</button>
          </div>
        </div>
      </div>
      <!-- 전체 데이터 관리 -->
      <div class="card">
        <div class="card-header"><h2>🗄️ 전체 데이터 관리 <span style="font-size:12px;font-weight:400;color:var(--text-muted)">(7일 제한 없음)</span></h2></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <select id="adminFilterWorker" onchange="loadAdminRecords()" style="max-width:160px"><option value="">전체 작업자</option></select>
            <input type="date" id="adminFilterFrom" onchange="loadAdminRecords()" style="max-width:180px">
            <input type="date" id="adminFilterTo" onchange="loadAdminRecords()" style="max-width:180px">
          </div>
          <div id="adminRecordsArea" class="scroll-box" style="max-height:500px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modalContainer"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════ SUPABASE ═══════════

let records=[], workers=[], mainTasks=[], subTasks=[], adminPin='1234';

// ═══════════ UTILS ═══════════
function showToast(m,ms=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}
function isWithin7Days(dateStr){const d=new Date(dateStr+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);const diff=(now-d)/(1000*60*60*24);return diff<=7}
function todayStr(){return new Date().toISOString().split('T')[0]}

// ═══════════ DATA LOADING ═══════════
async function loadAll(){
  const [rr,ww,mt,st,ac]=await Promise.all([
    sb.from('production_records').select('*').order('date',{ascending:false}),
    sb.from('workers').select('*').eq('active',true).order('name'),
    sb.from('main_tasks').select('*').eq('active',true).order('sort_order'),
    sb.from('sub_tasks').select('*').eq('active',true).order('sort_order'),
    sb.from('admin_config').select('*').eq('key','admin_pin').single()
  ]);
  if(rr.data) records=rr.data.map(r=>({id:r.id,date:r.date,worker:r.worker,type:r.type,taskName:r.task_name,quantity:r.quantity,note:r.note||'',created_at:r.created_at}));
  if(ww.data) workers=ww.data.map(w=>w.name);
  if(mt.data) mainTasks=mt.data.map(t=>t.name);
  if(st.data) subTasks=st.data.map(t=>t.name);
  if(ac.data) adminPin=ac.data.value;
  populateWorkerSelects();
  buildDatalist();
}

function populateWorkerSelects(){
  ['workerSelect','myWorkerSelect','adminFilterWorker'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const val=el.value;
    const first=id==='adminFilterWorker'?'<option value="">전체 작업자</option>':'<option value="">선택</option>';
    el.innerHTML=first+workers.map(w=>`<option value="${w}">${w}님</option>`).join('');
    el.value=val;
  });
}

function buildDatalist(){
  let dl=document.getElementById('sub-task-list');
  if(!dl){dl=document.createElement('datalist');dl.id='sub-task-list';document.body.appendChild(dl)}
  dl.innerHTML=[...subTasks,...mainTasks].map(t=>`<option value="${t}">`).join('');
}

// ═══════════ TAB SWITCHING ═══════════
document.getElementById('tabNav').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');if(!btn)return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-'+btn.dataset.tab).classList.add('active');
  if(btn.dataset.tab==='dashboard'&&dashUnlocked) renderDashboard();
  if(btn.dataset.tab==='admin'&&adminUnlocked) renderAdminSettings();
});

// ═══════════ PIN SYSTEM ═══════════
function createPinInputs(wrapperId){
  const wrap=document.getElementById(wrapperId);
  wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const inp=document.createElement('input');
    inp.type='text';inp.className='pin-digit';inp.maxLength=1;inp.inputMode='numeric';inp.dataset.idx=i;
    wrap.appendChild(inp);
  }
  const digits=wrap.querySelectorAll('.pin-digit');
  digits.forEach((inp,i)=>{
    inp.addEventListener('input',e=>{
      const v=e.target.value.replace(/\D/g,'');e.target.value=v;
      if(v&&i<3)digits[i+1].focus();
      if(i===3&&v){const pin=Array.from(digits).map(d=>d.value).join('');if(pin.length===4)checkPinFor(wrapperId,pin)}
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0){digits[i-1].focus();digits[i-1].value=''}});
    inp.addEventListener('paste',e=>{
      e.preventDefault();const p=(e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,4);
      p.split('').forEach((c,j)=>{if(digits[j])digits[j].value=c});
      if(p.length===4)checkPinFor(wrapperId,p);else if(p.length>0)digits[Math.min(p.length,3)].focus();
    });
  });
}

function checkPinFor(wrapperId,pin){
  const isDash=wrapperId==='dashPinWrap';
  const errorId=isDash?'dashPinError':'adminPinError';
  const lockId=isDash?'dashLock':'adminLock';
  const contentId=isDash?'dashContent':'adminContent';
  const digits=document.getElementById(wrapperId).querySelectorAll('.pin-digit');
  if(pin===adminPin){
    if(isDash)dashUnlocked=true;else adminUnlocked=true;
    document.getElementById(lockId).style.display='none';
    document.getElementById(contentId).style.display='block';
    if(isDash)renderDashboard();else renderAdminSettings();
  }else{
    document.getElementById(errorId).textContent='비밀번호가 틀렸습니다';
    digits.forEach(d=>{d.classList.add('error');d.value=''});digits[0].focus();
    setTimeout(()=>{digits.forEach(d=>d.classList.remove('error'));document.getElementById(errorId).textContent=''},1500);
  }
}

// ═══════════ INPUT FORM (TAB 1) ═══════════
function getTypeClass(t){return t==='메인작업'?'type-main':t==='밑작업'?'type-sub':'type-etc'}
function buildTaskNameCell(id,type,value){
  if(type==='메인작업'){
    let o='<option value="" disabled selected>품목 선택 (필수)</option>';
    mainTasks.forEach(t=>{o+=`<option value="${t}" ${value===t?'selected':''}>${t}</option>`});
    return `<select onchange="updateRow(${id},'taskName',this.value)" required style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px">${o}</select>`;
  }
  const ph=type==='밑작업'?'선택 또는 직접입력':'기타 내용 입력';
  return `<input type="text" list="sub-task-list" placeholder="${ph}" value="${value}" onchange="updateRow(${id},'taskName',this.value)" required style="font-size:13px">`;
}
function renderRows(){
  const tbody=document.getElementById('taskTableBody'),rows=JSON.parse(tbody.dataset.rows||'[]');
  tbody.innerHTML=rows.map(r=>`<tr>
    <td><select class="type-select ${getTypeClass(r.type)}" onchange="changeType(${r.id},this.value)">
      <option value="메인작업" ${r.type==='메인작업'?'selected':''}>메인작업</option>
      <option value="밑작업" ${r.type==='밑작업'?'selected':''}>밑작업</option>
      <option value="기타" ${r.type==='기타'?'selected':''}>기타</option></select></td>
    <td>${buildTaskNameCell(r.id,r.type,r.taskName)}</td>
    <td><input type="number" min="1" placeholder="0" value="${r.quantity}" onchange="updateRow(${r.id},'quantity',this.value)" required></td>
    <td><input type="text" placeholder="특이사항" value="${r.note}" onchange="updateRow(${r.id},'note',this.value)" style="font-size:13px"></td>
    <td style="text-align:center"><button type="button" class="btn-icon" onclick="removeRow(${r.id})" ${rows.length===1?'disabled':''}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button></td></tr>`).join('');
}
function getRows(){return JSON.parse(document.getElementById('taskTableBody').dataset.rows||'[]')}
function setRows(r){document.getElementById('taskTableBody').dataset.rows=JSON.stringify(r);renderRows()}
function addRow(){const r=getRows();r.push({id:++rowId,type:'메인작업',taskName:'',quantity:'',note:''});setRows(r)}
function removeRow(id){const r=getRows();if(r.length<=1)return;setRows(r.filter(x=>x.id!==id))}
function updateRow(id,f,v){const r=getRows(),x=r.find(x=>x.id===id);if(x)x[f]=v;document.getElementById('taskTableBody').dataset.rows=JSON.stringify(r)}
function changeType(id,t){const r=getRows(),x=r.find(x=>x.id===id);if(x){x.type=t;x.taskName=''}setRows(r)}

async function handleSubmit(e){
  e.preventDefault();
  const worker=document.getElementById('workerSelect').value,date=document.getElementById('dateInput').value;
  if(!worker){showToast('⚠️ 작업자 선택');return}
  const rows=getRows().filter(r=>r.taskName&&r.quantity);
  if(!rows.length){showToast('⚠️ 작업 내용 입력');return}
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='저장 중...';
  const payload=rows.map(r=>({date,worker,type:r.type,task_name:r.taskName,quantity:parseInt(r.quantity,10),note:r.note||''}));
  const{data,error}=await sb.from('production_records').insert(payload).select();
  btn.disabled=false;btn.textContent='💾 실적 제출하기';
  if(error){showToast('❌ '+error.message);return}
  data.forEach(r=>records.unshift({id:r.id,date:r.date,worker:r.worker,type:r.type,taskName:r.task_name,quantity:r.quantity,note:r.note||'',created_at:r.created_at}));
  showToast('✅ 저장 완료!');setRows([{id:++rowId,type:'메인작업',taskName:'',quantity:'',note:''}]);
}

// ═══════════ MY RECORDS (TAB 2) ═══════════
function loadMyRecords(){
  const w=document.getElementById('myWorkerSelect').value,area=document.getElementById('myRecordsArea');
  if(!w){area.innerHTML='<div class="empty-row">작업자를 선택해주세요.</div>';return}
  const mine=records.filter(r=>r.worker===w).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!mine.length){area.innerHTML='<div class="empty-row">데이터가 없습니다.</div>';return}
  let h=`<table class="edit-table"><thead><tr><th>날짜</th><th>구분</th><th>작업명</th><th>수량</th><th>비고</th><th style="width:90px">관리</th></tr></thead><tbody>`;
  mine.forEach(r=>{
    const ok=isWithin7Days(r.date),cls=ok?'':'expired-row';
    const badge=r.type==='메인작업'?'badge-main':r.type==='밑작업'?'badge-sub':'badge-etc';
    h+=`<tr class="${cls}"><td>${r.date}</td><td><span class="badge ${badge}">${r.type}</span></td>
      <td>${r.taskName}</td><td style="text-align:right;font-weight:700">${r.quantity}</td><td style="color:var(--text-muted)">${r.note||'-'}</td>
      <td>${ok?`<button class="btn btn-outline btn-sm" onclick="openEditModal(${r.id},false)">수정</button> <button class="btn btn-danger btn-sm" onclick="deleteRecord(${r.id},false)">삭제</button>`:'<span style="font-size:11px;color:var(--text-muted)">기한 만료</span>'}</td></tr>`;
  });
  h+='</tbody></table>';area.innerHTML=h;
}

// ═══════════ EDIT MODAL ═══════════
function openEditModal(recordId,isAdmin){
  const r=records.find(x=>x.id===recordId);if(!r)return;
  const mainOpts=mainTasks.map(t=>`<option value="${t}" ${r.taskName===t?'selected':''}>${t}</option>`).join('');
  const html=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h3>실적 수정</h3><button class="btn-icon" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="modal-body">
        <div class="form-grid">
          <div><label>진행일</label><input type="date" id="editDate" value="${r.date}"></div>
          ${isAdmin?`<div><label>담당자</label><select id="editWorker">${workers.map(w=>`<option value="${w}" ${r.worker===w?'selected':''}>${w}</option>`).join('')}</select></div>`:''}
        </div>
        <div style="margin-bottom:16px"><label>구분</label>
          <select id="editType" onchange="onEditTypeChange()">
            <option value="메인작업" ${r.type==='메인작업'?'selected':''}>메인작업</option>
            <option value="밑작업" ${r.type==='밑작업'?'selected':''}>밑작업</option>
            <option value="기타" ${r.type==='기타'?'selected':''}>기타</option>
          </select>
        </div>
        <div style="margin-bottom:16px"><label>작업명</label>
          <div id="editTaskNameWrap">${r.type==='메인작업'?`<select id="editTaskName">${mainOpts}</select>`:`<input type="text" id="editTaskName" list="sub-task-list" value="${r.taskName}">`}</div>
        </div>
        <div class="form-grid">
          <div><label>수량 (EA)</label><input type="number" id="editQty" min="1" value="${r.quantity}"></div>
          <div><label>비고</label><input type="text" id="editNote" value="${r.note}"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveEdit(${recordId},${isAdmin})">저장</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalContainer').innerHTML=html;
}

function onEditTypeChange(){
  const type=document.getElementById('editType').value,wrap=document.getElementById('editTaskNameWrap');
  if(type==='메인작업'){
    wrap.innerHTML=`<select id="editTaskName"><option value="" disabled selected>품목 선택</option>${mainTasks.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>`;
  }else{
    const ph=type==='밑작업'?'선택 또는 직접입력':'기타 내용';
    wrap.innerHTML=`<input type="text" id="editTaskName" list="sub-task-list" placeholder="${ph}">`;
  }
}

async function saveEdit(id,isAdmin){
  const date=document.getElementById('editDate').value;
  const worker=isAdmin?document.getElementById('editWorker').value:records.find(r=>r.id===id).worker;
  const type=document.getElementById('editType').value;
  const taskName=document.getElementById('editTaskName').value;
  const qty=parseInt(document.getElementById('editQty').value,10);
  const note=document.getElementById('editNote').value;
  if(!taskName||!qty){showToast('⚠️ 필수값 입력');return}
  const{error}=await sb.from('production_records').update({date,worker,type,task_name:taskName,quantity:qty,note}).eq('id',id);
  if(error){showToast('❌ '+error.message);return}
  const r=records.find(x=>x.id===id);
  if(r){r.date=date;r.worker=worker;r.type=type;r.taskName=taskName;r.quantity=qty;r.note=note}
  closeModal();showToast('✅ 수정 완료');
  if(isAdmin)loadAdminRecords();else loadMyRecords();
}

async function deleteRecord(id,isAdmin){
  if(!confirm('정말 삭제하시겠습니까?'))return;
  const{error}=await sb.from('production_records').delete().eq('id',id);
  if(error){showToast('❌ '+error.message);return}
  records=records.filter(r=>r.id!==id);
  showToast('🗑️ 삭제 완료');
  if(isAdmin)loadAdminRecords();else loadMyRecords();
}

function closeModal(){document.getElementById('modalContainer').innerHTML=''}

// ═══════════ DASHBOARD (TAB 3) ═══════════
let weekOffset=0;
function getWeekRange(off){
  const now=new Date(),day=now.getDay(),diff=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diff+(off*7));mon.setHours(0,0,0,0);
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  const dates=[];for(let i=0;i<5;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.toISOString().split('T')[0])}
  return{mon,fri,dates};
}
function fmtDate(s){const d=new Date(s+'T00:00:00'),days=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`}
function changeWeek(dir){weekOffset+=dir;renderWeekly()}

function renderDashboard(){renderKPI();renderWeekly();renderCapa();renderInventory();renderRecent()}

function renderKPI(){
  const m=records.filter(r=>r.type==='메인작업').reduce((s,r)=>s+r.quantity,0);
  const su=records.filter(r=>r.type==='밑작업').reduce((s,r)=>s+r.quantity,0);
  const et=records.filter(r=>r.type==='기타').reduce((s,r)=>s+r.quantity,0);
  document.getElementById('kpiArea').innerHTML=`
    <div class="kpi-card"><div class="kpi-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div><div class="kpi-label">메인작업 완료</div><div class="kpi-value">${m.toLocaleString()}<span class="unit">EA</span></div></div></div>
    <div class="kpi-card"><div class="kpi-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div><div class="kpi-label">밑작업 완료</div><div class="kpi-value">${su.toLocaleString()}<span class="unit">EA</span></div></div></div>
    <div class="kpi-card"><div class="kpi-icon gray"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></div><div><div class="kpi-label">기타 작업</div><div class="kpi-value">${et.toLocaleString()}<span class="unit">건</span></div></div></div>`;
}

function renderWeekly(){
  const{mon,fri,dates}=getWeekRange(weekOffset);
  document.getElementById('weekLabel').textContent=`${mon.getMonth()+1}/${mon.getDate()} ~ ${fri.getMonth()+1}/${fri.getDate()} (${mon.getFullYear()})`;
  const wr=records.filter(r=>dates.includes(r.date));
  if(!wr.length){document.getElementById('weeklyArea').innerHTML='<div class="empty-row">해당 주차 데이터 없음</div>';return}
  const byDate={};dates.forEach(d=>{byDate[d]=[]});wr.forEach(r=>{if(byDate[r.date])byDate[r.date].push(r)});
  let h='<table class="dash-table" style="font-size:13px">',wm=0,ws=0;
  dates.forEach(ds=>{
    const dr=byDate[ds];if(!dr||!dr.length)return;
    h+=`<tr><td colspan="5" class="weekly-date-header">${fmtDate(ds)}<span class="day-badge">${dr.length}건</span></td></tr>`;
    h+=`<tr style="background:#f4f5f7"><th style="padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-sec);border-bottom:1px solid var(--border)">담당자</th><th style="padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-sec);border-bottom:1px solid var(--border)">구분</th><th style="padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-sec);border-bottom:1px solid var(--border)">작업명</th><th style="padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-sec);border-bottom:1px solid var(--border);text-align:right">수량</th><th style="padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-sec);border-bottom:1px solid var(--border)">비고</th></tr>`;
    let dm=0,dsu=0;
    [...dr].sort((a,b)=>a.worker.localeCompare(b.worker)).forEach(r=>{
      const c=r.type==='메인작업'?'badge-main':r.type==='밑작업'?'badge-sub':'badge-etc';
      if(r.type==='메인작업')dm+=r.quantity;else if(r.type==='밑작업')dsu+=r.quantity;
      h+=`<tr><td style="padding:7px 16px;font-weight:600">${r.worker}</td><td style="padding:7px 16px"><span class="badge ${c}">${r.type}</span></td><td style="padding:7px 16px">${r.taskName}</td><td style="padding:7px 16px;text-align:right;font-weight:700">${r.quantity} EA</td><td style="padding:7px 16px;color:var(--text-muted);font-size:12px">${r.note||'-'}</td></tr>`;
    });
    h+=`<tr class="weekly-subtotal"><td colspan="3" style="padding:8px 16px;text-align:right">일 소계</td><td style="padding:8px 16px;text-align:right;color:var(--pri)">${dm+dsu} EA</td><td style="padding:8px 16px;font-size:11px;color:var(--text-muted)">메인 ${dm} / 밑 ${dsu}</td></tr>`;
    wm+=dm;ws+=dsu;
  });
  h+=`<tr style="background:var(--pri-lt);border-top:3px solid var(--pri)"><td colspan="3" style="padding:12px 16px;text-align:right;font-weight:800;font-size:14px;color:var(--pri-tx)">📊 주간 합계</td><td style="padding:12px 16px;text-align:right;font-weight:800;font-size:16px;color:var(--pri)">${wm+ws} EA</td><td style="padding:12px 16px;font-size:12px;color:var(--pri-tx)">메인 ${wm} / 밑 ${ws}</td></tr></table>`;
  document.getElementById('weeklyArea').innerHTML=h;
}

function renderCapa(){
  const wd={};records.forEach(r=>{if(!wd[r.worker])wd[r.worker]=new Set();wd[r.worker].add(r.date)});
  const st={};records.forEach(r=>{if(r.type!=='메인작업')return;const k=r.worker+'|'+r.taskName;if(!st[k])st[k]={worker:r.worker,taskName:r.taskName,total:0};st[k].total+=r.quantity});
  const cd=Object.values(st).map(s=>{const d=wd[s.worker].size,a=d>0?s.total/d:0;return{...s,days:d,avg:+a.toFixed(1),weekly:Math.round(a*5),monthly:Math.round(a*20)}}).sort((a,b)=>a.worker===b.worker?b.total-a.total:a.worker.localeCompare(b.worker));
  let h=`<thead class="capa-thead"><tr><th>담당자</th><th>품목</th><th class="num">누적</th><th class="num"><span class="tooltip-wrap">워킹데이<span class="tip">밑작업 포함 실적일수</span></span></th><th class="num" style="background:rgba(79,70,229,.08)"><span class="tooltip-wrap">일평균<span class="tip">출근 시 평균 생산</span></span></th><th class="num">주간(5일)</th><th class="num">월간(20일)</th></tr></thead><tbody>`;
  if(!cd.length)h+=`<tr><td colspan="7" class="empty-row">데이터 없음</td></tr>`;
  else cd.forEach((it,i)=>{const sw=i===0||cd[i-1].worker!==it.worker;h+=`<tr><td style="font-weight:600">${sw?it.worker:'<span class="worker-dim">'+it.worker+'</span>'}</td><td style="font-weight:600;color:var(--ind)">${it.taskName}</td><td class="num" style="font-weight:700">${it.total}</td><td class="num" style="color:var(--text-muted)">${it.days}일</td><td class="num capa-highlight">${it.avg}</td><td class="num" style="color:var(--text-muted)">${it.weekly}</td><td class="num" style="color:var(--text-muted)">${it.monthly}</td></tr>`});
  document.getElementById('capaTable').innerHTML=h+'</tbody>';
}

function renderInventory(){
  const st={};records.forEach(r=>{if(r.type!=='메인작업')return;st[r.taskName]=(st[r.taskName]||0)+r.quantity});
  const d=Object.entries(st).sort((a,b)=>b[1]-a[1]);
  let h=`<table class="dash-table"><thead class="inv-thead"><tr><th>품목</th><th class="num-right">누적(EA)</th></tr></thead><tbody>`;
  if(!d.length)h+=`<tr><td colspan="2" class="empty-row">없음</td></tr>`;
  else d.forEach(([n,q])=>{h+=`<tr><td style="font-weight:600">${n}</td><td class="num-right" style="font-weight:800;color:var(--pri)">${q}</td></tr>`});
  document.getElementById('inventoryArea').innerHTML=h+'</tbody></table>';
}

function renderRecent(){
  const s=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,50);
  let h=`<table class="dash-table"><thead><tr><th>날짜/담당자</th><th>구분</th><th>작업명/수량</th></tr></thead><tbody>`;
  s.forEach(r=>{const c=r.type==='메인작업'?'badge-main':r.type==='밑작업'?'badge-sub':'badge-etc';h+=`<tr><td><div style="font-size:11px;color:var(--text-muted)">${r.date}</div><div style="font-weight:600">${r.worker}</div></td><td><span class="badge ${c}">${r.type}</span></td><td><div style="font-weight:600">${r.taskName} <span style="color:var(--text-muted)">(${r.quantity}EA)</span></div>${r.note?'<div style="font-size:11px;color:var(--text-muted)">'+r.note+'</div>':''}</td></tr>`});
  document.getElementById('recentArea').innerHTML=h+'</tbody></table>';
}

// ═══════════ ADMIN SETTINGS (TAB 4) ═══════════
function renderAdminSettings(){renderWorkersList();renderMainTasksList();renderSubTasksList();loadAdminRecords()}

function renderWorkersList(){
  let h='<div class="settings-list">';
  workers.forEach(w=>{h+=`<div class="settings-item"><span class="name">${w}</span><button class="btn btn-danger btn-sm" onclick="removeWorker('${w}')">삭제</button></div>`});
  h+='</div>';document.getElementById('workersList').innerHTML=h;
}
async function addWorker(){
  const inp=document.getElementById('newWorkerInput'),name=inp.value.trim();if(!name)return;
  const{error}=await sb.from('workers').insert({name});
  if(error){showToast('❌ '+error.message);return}
  workers.push(name);workers.sort();inp.value='';populateWorkerSelects();renderWorkersList();showToast('✅ 작업자 추가');
}
async function removeWorker(name){
  if(!confirm(`"${name}" 작업자를 삭제하시겠습니까?`))return;
  const{error}=await sb.from('workers').update({active:false}).eq('name',name);
  if(error){showToast('❌ '+error.message);return}
  workers=workers.filter(w=>w!==name);populateWorkerSelects();renderWorkersList();showToast('🗑️ 삭제 완료');
}

function renderMainTasksList(){
  let h='<div class="settings-list">';
  mainTasks.forEach(t=>{h+=`<div class="settings-item"><span class="name" style="font-size:12px">${t}</span><button class="btn btn-danger btn-sm" onclick="removeMainTask('${t.replace(/'/g,"\\'")}')">삭제</button></div>`});
  h+='</div>';document.getElementById('mainTasksList').innerHTML=h;
}
async function addMainTask(){
  const inp=document.getElementById('newMainTaskInput'),name=inp.value.trim();if(!name)return;
  const{error}=await sb.from('main_tasks').insert({name,sort_order:mainTasks.length+1});
  if(error){showToast('❌ '+error.message);return}
  mainTasks.push(name);inp.value='';buildDatalist();renderMainTasksList();showToast('✅ 품목 추가');
}
async function removeMainTask(name){

  const{error}=await sb.from('main_tasks').update({active:false}).eq('name',name);
  if(error){showToast('❌ '+error.message);return}
  mainTasks=mainTasks.filter(t=>t!==name);buildDatalist();renderMainTasksList();showToast('🗑️ 삭제');
}

async function changePin(){
  const inp=document.getElementById('newPinInput'),pin=inp.value.trim();
  if(pin.length!==4||!/^\d+$/.test(pin)){showToast('⚠️ 숫자 4자리를 입력하세요');return}
  const{error}=await sb.from('admin_config').update({value:pin}).eq('key','admin_pin');
  if(error){showToast('❌ '+error.message);return}
  adminPin=pin;inp.value='';showToast('✅ 비밀번호 변경 완료');
}

// 전체 데이터 관리
function loadAdminRecords(){
  const w=document.getElementById('adminFilterWorker').value;
  const from=document.getElementById('adminFilterFrom').value;
  const to=document.getElementById('adminFilterTo').value;
  let filtered=[...records];
  if(w)filtered=filtered.filter(r=>r.worker===w);
  if(from)filtered=filtered.filter(r=>r.date>=from);
  if(to)filtered=filtered.filter(r=>r.date<=to);
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const area=document.getElementById('adminRecordsArea');
  if(!filtered.length){area.innerHTML='<div class="empty-row">데이터 없음</div>';return}
  let h=`<table class="edit-table"><thead><tr><th>날짜</th><th>담당자</th><th>구분</th><th>작업명</th><th>수량</th><th>비고</th><th style="width:90px">관리</th></tr></thead><tbody>`;
  filtered.forEach(r=>{
    const badge=r.type==='메인작업'?'badge-main':r.type==='밑작업'?'badge-sub':'badge-etc';
    h+=`<tr><td>${r.date}</td><td style="font-weight:600">${r.worker}</td><td><span class="badge ${badge}">${r.type}</span></td><td>${r.taskName}</td><td style="text-align:right;font-weight:700">${r.quantity}</td><td style="color:var(--text-muted)">${r.note||'-'}</td>
      <td><button class="btn btn-outline btn-sm" onclick="openEditModal(${r.id},true)">수정</button> <button class="btn btn-danger btn-sm" onclick="deleteRecord(${r.id},true)">삭제</button></td></tr>`;
  });
  h+='</tbody></table>';area.innerHTML=h;
}
